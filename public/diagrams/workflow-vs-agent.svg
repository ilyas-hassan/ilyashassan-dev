<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">

  <defs>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d9488"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>

  <!-- separator -->
  <line x1="400" y1="20" x2="400" y2="440" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LEFT: WORKFLOW -->
  <text x="200" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">Workflow</text>
  <text x="200" y="60" text-anchor="middle" font-size="12" font-style="italic" fill="#6b7280">Following a recipe</text>

  <rect x="120" y="90" width="160" height="36" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="200" y="113" text-anchor="middle" font-size="13" fill="#1f2937">Chop onions</text>

  <line x1="200" y1="126" x2="200" y2="148" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <rect x="120" y="150" width="160" height="36" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="200" y="173" text-anchor="middle" font-size="13" fill="#1f2937">Sauté</text>

  <line x1="200" y1="186" x2="200" y2="208" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <rect x="120" y="210" width="160" height="36" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="200" y="233" text-anchor="middle" font-size="13" fill="#1f2937">Add tomatoes</text>

  <line x1="200" y1="246" x2="200" y2="268" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <rect x="120" y="270" width="160" height="36" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="200" y="293" text-anchor="middle" font-size="13" fill="#1f2937">Simmer</text>

  <line x1="200" y1="306" x2="200" y2="328" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <rect x="120" y="330" width="160" height="36" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="200" y="353" text-anchor="middle" font-size="13" fill="#1f2937">Serve</text>

  <text x="200" y="400" text-anchor="middle" font-size="13" font-style="italic" fill="#4b5563">Same steps. Every time.</text>

  <!-- RIGHT: AGENT -->
  <text x="600" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">Agent</text>
  <text x="600" y="60" text-anchor="middle" font-size="12" font-style="italic" fill="#6b7280">Cooking by feel</text>

  <!-- Adjust box (top) -->
  <rect x="540" y="110" width="120" height="36" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="600" y="133" text-anchor="middle" font-size="13" fill="#1f2937">Adjust</text>

  <!-- Taste diamond (middle) -->
  <polygon points="600,190 660,220 600,250 540,220" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="600" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Taste</text>

  <!-- Serve box (bottom) -->
  <rect x="540" y="310" width="120" height="36" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="600" y="333" text-anchor="middle" font-size="13" fill="#1f2937">Serve</text>

  <!-- Up arrow (right side): Taste -> Adjust, labeled "not ready" -->
  <line x1="625" y1="200" x2="625" y2="151" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="638" y="178" font-size="11" fill="#6b7280">not ready</text>

  <!-- Down arrow (left side): Adjust -> Taste -->
  <line x1="575" y1="148" x2="575" y2="198" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Exit arrow: Taste -> Serve, labeled "ready" -->
  <line x1="600" y1="250" x2="600" y2="307" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="610" y="282" font-size="11" fill="#6b7280">ready</text>

  <text x="600" y="400" text-anchor="middle" font-size="13" font-style="italic" fill="#4b5563">Steps depend on what the chef decides.</text>

</svg>
